<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞机大战 - doubao-version</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
canvas {
  border: 2px solid #3a3a8a;
  border-radius: 4px;
  box-shadow: 0 0 30px rgba(100, 100, 255, 0.3); /* will be replaced by COLORS.canvasGlow at runtime — keep CSS as fallback */
}
#ui-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: #fff;
  pointer-events: none;
  z-index: 10;
}
#ui-overlay.active { pointer-events: auto; }
#ui-overlay h1 {
  font-size: 48px;
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(255, 200, 50, 0.8);
  color: #ffc832;
}
#ui-overlay p {
  font-size: 18px;
  margin-bottom: 10px;
  color: #aab;
}
#ui-overlay .score-display {
  font-size: 28px;
  color: #ff6b6b;
  margin: 15px 0;
}
#ui-overlay button {
  margin-top: 20px;
  padding: 12px 40px;
  font-size: 20px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  pointer-events: auto;
  transition: transform 0.1s, box-shadow 0.1s;
}
#ui-overlay button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(102, 126, 234, 0.6);
}
#hud {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 16px;
  z-index: 5;
  display: none;
  gap: 30px;
  justify-content: center;
}
#hud span { background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 4px; }
#hud-combo { color: #ffc832; font-weight: bold; min-width: 100px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="hud">
  <span id="hud-score">得分: 0</span>
  <span id="hud-high">最高: 0</span>
  <span id="hud-combo"></span>
  <span id="hud-lives">生命: 3</span>
  <span id="hud-level">关卡: 1</span>
</div>
<div id="ui-overlay" class="active">
  <h1>飞机大战</h1>
  <p>WASD / 方向键移动 | 自动射击 | P/Esc 暂停</p>
  <p>支持鼠标/触屏操作</p>
  <button id="startBtn">开始游戏</button>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiOverlay = document.getElementById('ui-overlay');
const hud = document.getElementById('hud');

const W = 480;
const H = 720;
canvas.width = W;
canvas.height = H;

const COLORS = {
  player: '#4fc3f7',
  playerCore: '#b3e5fc',
  playerFlame: '#ff9800',
  playerBullet: '#ffeb3b',
  playerBulletWide: '#76ff03',
  enemy: ['#ef5350', '#ab47bc', '#ff7043', '#66bb6a', '#42a5f5'],
  enemyMedium: '#ff7043',
  enemyMediumEye: '#fff',
  enemyHeavy: '#ab47bc',
  enemyHeavyCore: '#e1bee7',
  enemyBullet: '#ff5252',
  enemyBoss: '#e91e63',
  enemyBossCore: '#f8bbd0',
  explosion: ['#ff6b35', '#ff9800', '#ffeb3b', '#fff'],
  powerup: ['#76ff03', '#00e5ff', '#ff4081'],
  powerupLabel: '#fff',
  shieldAura: 'rgba(0, 229, 255, 0.6)',
  bg: '#0a0a2e',
  canvasBorder: '#3a3a8a',
  canvasGlow: 'rgba(100, 100, 255, 0.3)',
  titleColor: '#ffc832',
  titleGlow: 'rgba(255, 200, 50, 0.8)',
  subtitleColor: '#aab',
  btnBg: 'linear-gradient(135deg, #667eea, #764ba2)',
  btnHoverGlow: 'rgba(102, 126, 234, 0.6)',
  warningColor: '#ff1744',
  pauseColor: '#ffc832',
  hpBarBg: '#333',
  hpBarFg: '#4caf50',
  hudBg: 'rgba(0,0,0,0.5)',
  hudText: '#fff'
};

let gameState = 'menu';
let score = 0;
let lives = 3;
let level = 1;
let frameCount = 0;
let lastTime = 0;

let player, bullets, enemies, particles, powerups, stars, enemyBullets;
let highScore = parseInt(localStorage.getItem('planeWarHighScore') || '0');
let paused = false;
let warnings = [];
let combo = 0;
let comboTimer = 0;
let comboMultiplier = 1;

function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.6 + 0.2
    });
  }
}

function initGame() {
  player = {
    x: W / 2, y: H - 100, w: 36, h: 44,
    speed: 5, shootCooldown: 0, shootRate: 8,
    powerLevel: 1, invincible: 120, shield: false
  };
  bullets = [];
  enemies = [];
  particles = [];
  powerups = [];
  enemyBullets = [];
  warnings = [];
  combo = 0;
  comboTimer = 0;
  comboMultiplier = 1;
  screenShake = { intensity: 0, duration: 0, timer: 0 };
  score = 0;
  lives = 3;
  level = 1;
  frameCount = 0;
}

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
  if ((e.key === 'p' || e.key === 'P' || e.key === 'Escape') && gameState === 'playing') {
    paused = !paused;
    if (!paused) { lastTime = performance.now(); gameLoop(lastTime); }
  }
});
document.addEventListener('keyup', e => keys[e.key] = false);

let mouseDown = false;
let useTouch = false;

canvas.addEventListener('mousemove', e => {
  if (useTouch) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  if (gameState === 'playing') {
    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, mx));
  }
});
canvas.addEventListener('mousedown', () => { mouseDown = true; useTouch = false; });
canvas.addEventListener('mouseup', () => mouseDown = false);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  useTouch = true;
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const mx = (touch.clientX - rect.left) * (W / rect.width);
  if (gameState === 'playing') {
    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, mx));
  }
  mouseDown = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const mx = (touch.clientX - rect.left) * (W / rect.width);
  if (gameState === 'playing') {
    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, mx));
  }
}, { passive: false });
canvas.addEventListener('touchend', () => mouseDown = false);

document.getElementById('startBtn').addEventListener('click', startGame);

function startGame() {
  initGame();
  paused = false;
  gameState = 'playing';
  uiOverlay.classList.remove('active');
  uiOverlay.innerHTML = '';
  hud.style.display = 'flex';
  document.getElementById('hud-high').textContent = `最高: ${highScore}`;
  lastTime = performance.now();
  gameLoop(lastTime);
}

function gameOver() {
  gameState = 'over';
  if (score > highScore) { highScore = score; localStorage.setItem('planeWarHighScore', String(highScore)); }
  hud.style.display = 'none';
  uiOverlay.classList.add('active');
  uiOverlay.innerHTML = `
    <h1>游戏结束</h1>
    <p class="score-display">最终得分: ${formatScore(score)}</p>
    <p>最高得分: ${formatScore(highScore)}</p>
    <p>到达关卡: ${level}</p>
    <button onclick="startGame()">再来一局</button>
  `;
}

function formatScore(n) {
  return String(n).padStart(6, '0');
}

function spawnEnemy() {
  const spawnRate = Math.max(30, 70 - level * 4);
  if (frameCount % spawnRate !== 0) return;

  if (level >= 3 && level % 3 === 0 && frameCount % 300 === 0 && !enemies.some(e => e.type === 'boss')) {
    warnings.push({ text: 'WARNING: BOSS!', timer: 90 });
    enemies.push({
      x: W / 2, y: -60, w: 80, h: 70, hp: 15 + level * 3, maxHp: 15 + level * 3,
      speed: 0.6, type: 'boss', color: '#e91e63',
      shootTimer: 60, shootRate: 30, points: 2000 + level * 500,
      phase: 0, moveDir: 1
    });
    return;
  }

  const r = Math.random();
  const leftPad = 15, rightPad = W - 15;
  const baseX = () => Math.random() * (rightPad - leftPad) + leftPad;
  let enemy;
  if (r < 0.55) {
    enemy = {
      x: baseX(), y: -28, w: 28, h: 28, hp: 1,
      speed: 1.2 + Math.random() * level * 0.15, type: 'basic',
      color: COLORS.enemy[Math.floor(Math.random() * COLORS.enemy.length)],
      shootTimer: 0, points: 100
    };
  } else if (r < 0.85) {
    enemy = {
      x: baseX(), y: -36, w: 36, h: 36, hp: 2,
      speed: 0.8 + Math.random() * level * 0.12, type: 'medium',
      color: COLORS.enemyMedium, shootTimer: 80 + Math.random() * 60,
      shootRate: Math.max(80, 140 - level * 8), points: 250
    };
  } else {
    enemy = {
      x: baseX(), y: -44, w: 44, h: 44, hp: 3,
      speed: 0.6 + Math.random() * level * 0.08, type: 'heavy',
      color: COLORS.enemyHeavy, shootTimer: 60 + Math.random() * 40,
      shootRate: Math.max(70, 110 - level * 6), points: 500
    };
  }
  enemies.push(enemy);
}

function spawnPowerup(x, y) {
  if (Math.random() > 0.18) return;
  const types = ['power', 'life', 'shield'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerups.push({
    x, y, w: 20, h: 20, type, speed: 1.5, pulse: 0,
    clamp: { left: 12, right: W - 12, top: -20, bottom: H + 20 }
  });
}

function createExplosion(x, y, count, colors) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: Math.random() * 4 + 2,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

function playerShoot() {
  if (player.shootCooldown > 0) return;
  player.shootCooldown = player.shootRate;
  const bx = player.x;
  const by = player.y - player.h / 2;
  bullets.push({ x: bx, y: by, w: 4, h: 12, speed: 8, color: COLORS.playerBullet });
  if (player.powerLevel >= 2) {
    bullets.push({ x: bx - 10, y: by + 4, w: 4, h: 10, speed: 7, color: COLORS.playerBullet });
    bullets.push({ x: bx + 10, y: by + 4, w: 4, h: 10, speed: 7, color: COLORS.playerBullet });
  }
  if (player.powerLevel >= 3) {
    bullets.push({ x: bx - 18, y: by + 8, w: 3, h: 8, speed: 6, color: '#76ff03' });
    bullets.push({ x: bx + 18, y: by + 8, w: 3, h: 8, speed: 6, color: '#76ff03' });
  }
}

function drawPlayer() {
  const p = player;
  ctx.save();
  ctx.translate(p.x, p.y);
  if (p.invincible > 0 && Math.floor(p.invincible / 5) % 2 === 0) {
    ctx.globalAlpha = 0.3;
  }
  ctx.fillStyle = COLORS.player;
  ctx.beginPath();
  ctx.moveTo(0, -p.h / 2);
  ctx.lineTo(-p.w / 2, p.h / 2);
  ctx.lineTo(-p.w / 4, p.h / 3);
  ctx.lineTo(0, p.h / 2 - 4);
  ctx.lineTo(p.w / 4, p.h / 3);
  ctx.lineTo(p.w / 2, p.h / 2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = COLORS.playerCore;
  ctx.beginPath();
  ctx.arc(0, -2, 5, 0, Math.PI * 2);
  ctx.fill();
  if (frameCount % 4 < 2) {
    ctx.fillStyle = COLORS.playerFlame;
    ctx.beginPath();
    ctx.moveTo(-4, p.h / 2);
    ctx.lineTo(0, p.h / 2 + 6 + Math.random() * 6);
    ctx.lineTo(4, p.h / 2);
    ctx.fill();
  }
  if (p.shield) {
    ctx.strokeStyle = COLORS.shieldAura;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, p.w / 2 + 8, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.fillStyle = e.color;

  if (e.type === 'basic') {
    ctx.beginPath();
    ctx.moveTo(0, -e.h / 2);
    ctx.lineTo(e.w / 2, e.h / 2);
    ctx.lineTo(0, e.h / 3);
    ctx.lineTo(-e.w / 2, e.h / 2);
    ctx.closePath();
    ctx.fill();
  } else if (e.type === 'medium') {
    ctx.fillRect(-e.w / 2, -e.h / 2, e.w, e.h);
    ctx.fillStyle = COLORS.enemyMediumEye;
    ctx.fillRect(-3, -3, 6, 6);
  } else if (e.type === 'heavy') {
    ctx.beginPath();
    ctx.arc(0, 0, e.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = COLORS.enemyHeavyCore;
    ctx.beginPath();
    ctx.arc(0, 0, e.w / 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(String(e.hp), 0, 4);
  } else if (e.type === 'boss') {
    ctx.fillStyle = COLORS.enemyBoss;
    ctx.beginPath();
    ctx.moveTo(0, -e.h / 2);
    ctx.lineTo(e.w / 2, 0);
    ctx.lineTo(e.w / 3, e.h / 2);
    ctx.lineTo(-e.w / 3, e.h / 2);
    ctx.lineTo(-e.w / 2, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = COLORS.enemyBossCore;
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(String(e.hp), 0, 4);
    ctx.strokeStyle = COLORS.hpBarBg;
    ctx.lineWidth = 3;
    ctx.strokeRect(-e.w / 2, -e.h / 2 - 12, e.w, 6);
    ctx.fillStyle = COLORS.hpBarFg;
    const hpRatio = e.hp / e.maxHp;
    ctx.fillRect(-e.w / 2, -e.h / 2 - 12, e.w * hpRatio, 6);
  }

  ctx.restore();
}

function drawPowerup(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  p.pulse += 0.1;
  const s = 1 + Math.sin(p.pulse) * 0.15;
  ctx.scale(s, s);
  const colorMap = { power: COLORS.powerup[0], life: COLORS.powerup[1], shield: COLORS.powerup[2] };
  const labelMap = { power: 'P', life: '+', shield: 'S' };
  ctx.fillStyle = colorMap[p.type];
  ctx.beginPath();
  ctx.arc(0, 0, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = COLORS.powerupLabel;
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(labelMap[p.type], 0, 0);
  ctx.restore();
}

function updateStars() {
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
}

function collides(ax, ay, aw, ah, bx, by, bw, bh) {
  const shrink = 4;
  return Math.abs(ax - bx) < (aw / 2 + bw / 2 - shrink) &&
         Math.abs(ay - by) < (ah / 2 + bh / 2 - shrink);
}

function hitPlayer() {
  if (player.shield) {
    player.shield = false;
    player.invincible = 0;
    return;
  }
  if (player.invincible > 0) return;
  lives--;
  player.invincible = 120;
  createExplosion(player.x, player.y, 12, [COLORS.player, '#fff']);
  addScreenShake(6, 8);
  if (lives <= 0) gameOver();
}

function addScreenShake(intensity, duration) {
  screenShake = { intensity, duration, timer: duration };
}

let screenShake = { intensity: 0, duration: 0, timer: 0 };

function update(dt) {
  if (gameState !== 'playing') return;
  frameCount++;
  const ds = dt / 16.67;

  if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed * ds;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed * ds;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed * ds;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed * ds;
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
  player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y));

  playerShoot();
  if (player.shootCooldown > 0) player.shootCooldown -= ds;
  if (player.invincible > 0) player.invincible -= ds;
  if (player.shield && player.invincible <= 0) player.shield = false;

  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= bullets[i].speed * ds;
    if (bullets[i].y < -20) bullets.splice(i, 1);
  }

  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * ds;
    b.y += b.vy * ds;
    if (b.y > H + 20 || b.y < -20 || b.x < -20 || b.x > W + 20) {
      enemyBullets.splice(i, 1);
      continue;
    }
    if (collides(b.x, b.y, b.w, b.h, player.x, player.y, player.w, player.h)) {
      hitPlayer();
      if (gameState !== 'playing') return;
      enemyBullets.splice(i, 1);
    }
  }

  spawnEnemy();

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed * ds;
    if (e.y > H + 60) { enemies.splice(i, 1); continue; }

    if (e.type === 'boss') {
      e.x += e.moveDir * 1 * ds;
      if (e.x < e.w / 2 + 10) e.moveDir = 1;
      if (e.x > W - e.w / 2 - 10) e.moveDir = -1;
      if (e.y < 70) e.y += e.speed * ds;
      e.shootTimer -= ds;
      if (e.shootTimer <= 0) {
        e.shootTimer = e.shootRate;
        for (let a = 0; a < 8; a++) {
          const angle = (Math.PI * 2 / 8) * a + e.phase;
          enemyBullets.push({
            x: e.x, y: e.y + e.h / 2,
            vx: Math.cos(angle) * (2 + level * 0.1),
            vy: Math.sin(angle) * (2 + level * 0.1),
            w: 6, h: 6, color: '#e91e63'
          });
        }
        e.phase += 0.25;
      }
    } else if (e.type !== 'basic') {
      e.shootTimer -= ds;
      if (e.shootTimer <= 0) {
        e.shootTimer = e.shootRate;
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        enemyBullets.push({
          x: e.x, y: e.y + e.h / 2,
          vx: Math.cos(angle) * (2 + level * 0.1),
          vy: Math.sin(angle) * (2 + level * 0.1),
          w: 5, h: 5, color: COLORS.enemyBullet
        });
      }
    }

    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (collides(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
        e.hp--;
        bullets.splice(j, 1);
        if (e.hp <= 0) {
          score += e.points;
          combo++;
          comboTimer = 120;
          comboMultiplier = Math.min(5, 1 + Math.floor(combo / 5));
          score += e.points * (comboMultiplier - 1);
          createExplosion(e.x, e.y, 15, COLORS.explosion);
          if (e.type === 'boss') {
            createExplosion(e.x, e.y, 40, ['#e91e63', '#ffc832', '#ff6b35', '#fff']);
            spawnPowerup(e.x - 20, e.y);
            spawnPowerup(e.x + 20, e.y);
            spawnPowerup(e.x, e.y - 20);
          }
          spawnPowerup(e.x, e.y);
          enemies.splice(i, 1);
          const newLevel = Math.floor(score / 2000) + 1;
          if (newLevel > level) level = newLevel;
        } else {
          createExplosion(e.x, e.y, 5, ['#fff', e.color]);
        }
        break;
      }
    }

    if (gameState !== 'playing') return;

    if (enemies[i] && player.invincible <= 0) {
      const e2 = enemies[i];
      if (collides(player.x, player.y, player.w, player.h, e2.x, e2.y, e2.w, e2.h)) {
        hitPlayer();
        if (gameState !== 'playing') return;
        enemies.splice(i, 1);
      }
    }
  }

  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.speed * ds;
    if (p.y > H + 20) { powerups.splice(i, 1); continue; }
    if (collides(p.x, p.y, 24, 24, player.x, player.y, player.w, player.h)) {
      if (p.type === 'power') player.powerLevel = Math.min(3, player.powerLevel + 1);
      else if (p.type === 'life') lives = Math.min(5, lives + 1);
      else if (p.type === 'shield') { player.shield = true; player.invincible = 9999; }
      createExplosion(p.x, p.y, 8, [COLORS.powerup[['power', 'life', 'shield'].indexOf(p.type)]]);
      powerups.splice(i, 1);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * ds;
    p.y += p.vy * ds;
    p.life -= ds;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = warnings.length - 1; i >= 0; i--) {
    warnings[i].timer -= ds;
    if (warnings[i].timer <= 0) warnings.splice(i, 1);
  }

  if (comboTimer > 0) {
    comboTimer -= ds;
    if (comboTimer <= 0) { combo = 0; comboMultiplier = 1; }
  }

  document.getElementById('hud-score').textContent = `得分: ${formatScore(score)}`;
  document.getElementById('hud-lives').textContent = `生命: ${lives}`;
  document.getElementById('hud-level').textContent = `关卡: ${level}`;
  document.getElementById('hud-combo').textContent = combo >= 3 ? `x${comboMultiplier} COMBO(${combo})` : '';
}

function draw() {
  ctx.save();
  if (screenShake.timer > 0) {
    screenShake.timer--;
    const sx = (Math.random() - 0.5) * screenShake.intensity;
    const sy = (Math.random() - 0.5) * screenShake.intensity;
    ctx.translate(sx, sy);
  }
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);
  updateStars();

  for (const b of bullets) {
    ctx.fillStyle = b.color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = b.color;
    ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
    ctx.shadowBlur = 0;
  }

  for (const b of enemyBullets) {
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.w / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  for (const e of enemies) drawEnemy(e);
  for (const p of powerups) drawPowerup(p);

  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  if (gameState === 'playing' || gameState === 'over') drawPlayer();

  for (const w of warnings) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, w.timer / 30) * (Math.sin(frameCount * 0.3) * 0.3 + 0.7);
    ctx.fillStyle = COLORS.warningColor;
    ctx.font = 'bold 28px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(w.text, W / 2, H / 2 - 50);
    ctx.restore();
  }

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = COLORS.pauseColor;
    ctx.font = 'bold 36px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('暂停', W / 2, H / 2 - 10);
    ctx.fillStyle = COLORS.subtitleColor;
    ctx.font = '16px "Courier New", monospace';
    ctx.fillText('按 P 或 Esc 继续', W / 2, H / 2 + 30);
  }
  ctx.restore();
}

function gameLoop(timestamp) {
  if (gameState !== 'playing') return;
  if (paused) { draw(); return; }
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

initStars();
(function menuDraw() {
  if (gameState !== 'menu') return;
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);
  updateStars();
  requestAnimationFrame(menuDraw);
})();
</script>
</body>
